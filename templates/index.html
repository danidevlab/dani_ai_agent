<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>선우 AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    background:
        radial-gradient(circle at top left,#4f46e5,#0f172a 60%);

    font-family:-apple-system,BlinkMacSystemFont,
    "Segoe UI",sans-serif;

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.container{
    width:100%;
    max-width:950px;
    height:92vh;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:30px;

    overflow:hidden;

    display:flex;
    flex-direction:column;

    box-shadow:
        0 25px 60px rgba(0,0,0,.45);
}

header{
    padding:28px;

    border-bottom:1px solid rgba(255,255,255,.08);

    text-align:center;
}

header h1{
    font-size:2rem;
    margin-bottom:8px;
}

header p{
    opacity:.7;
}

#chat{
    flex:1;

    overflow-y:auto;

    padding:25px;

    display:flex;
    flex-direction:column;

    gap:16px;
}

.message{
    max-width:80%;

    padding:16px 20px;

    border-radius:22px;

    line-height:1.6;

    white-space:pre-wrap;
    word-break:break-word;

    animation:fade .25s ease;
}

.user{
    align-self:flex-end;

    background:
        linear-gradient(
            135deg,
            #4f46e5,
            #2563eb
        );
}

.ai{
    align-self:flex-start;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.08);
}

.input-area{
    padding:20px;

    border-top:1px solid rgba(255,255,255,.08);

    display:flex;
    gap:15px;
}

textarea{
    flex:1;

    height:75px;

    resize:none;

    border:none;
    outline:none;

    border-radius:20px;

    padding:16px;

    font-size:16px;

    background:rgba(255,255,255,.08);

    color:white;
}

textarea::placeholder{
    color:rgba(255,255,255,.45);
}

button{
    width:120px;

    border:none;
    border-radius:20px;

    cursor:pointer;

    font-size:16px;
    font-weight:bold;

    background:
        linear-gradient(
            135deg,
            #6366f1,
            #2563eb
        );

    color:white;

    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.96);
}

#chat::-webkit-scrollbar{
    width:8px;
}

#chat::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.2);
    border-radius:20px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <header>
        <h1>🤖 선우 AI</h1>
        <p>코딩, 만들기, 궁금한 거 무엇이든 물어봐!</p>
    </header>

    <div id="chat"></div>

    <div class="input-area">

        <textarea
            id="message"
            placeholder="메시지를 입력해..."
        ></textarea>

        <button onclick="sendMessage()">
            보내기
        </button>

    </div>

</div>

<script>

async function sendMessage(){

    const input = document.getElementById("message");
    const chat = document.getElementById("chat");

    const msg = input.value.trim();

    if(!msg) return;

    addMessage(msg,"user");

    input.value="";

    const loading =
        addMessage("생각하는 중...","ai");

    try{

        const response = await fetch("/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:msg
            })
        });

        const data = await response.json();

        loading.textContent = data.reply;

    }catch(e){

        loading.textContent =
            "오류가 발생했어 😢";
    }

    chat.scrollTop = chat.scrollHeight;
}

function addMessage(text,type){

    const chat =
        document.getElementById("chat");

    const div =
        document.createElement("div");

    div.className =
        `message ${type}`;

    div.textContent = text;

    chat.appendChild(div);

    chat.scrollTop =
        chat.scrollHeight;

    return div;
}

document
.getElementById("message")
.addEventListener("keydown",e=>{

    if(e.key==="Enter" && !e.shiftKey){

        e.preventDefault();

        sendMessage();
    }

});

</script>

</body>
</html>
