<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선우 AI</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:radial-gradient(circle at top left,#4f46e5,#0f172a 60%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#fff;display:flex;justify-content:center;align-items:center;padding:20px}.container{width:100%;max-width:950px;height:92vh;background:rgba(255,255,255,.08);backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,.08);border-radius:30px;overflow:hidden;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;align-items:center;padding:28px;border-bottom:1px solid rgba(255,255,255,.08)}#chat{flex:1;overflow-y:auto;padding:25px;display:flex;flex-direction:column;gap:16px}.message{max-width:80%;padding:16px 20px;border-radius:22px;white-space:pre-wrap}.user{align-self:flex-end;background:linear-gradient(135deg,#4f46e5,#2563eb)}.ai{align-self:flex-start;background:rgba(255,255,255,.08)}.input-area{padding:20px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:15px}textarea{flex:1;height:75px;resize:none;border:none;outline:none;border-radius:20px;padding:16px;background:rgba(255,255,255,.08);color:#fff}button{border:none;border-radius:20px;padding:12px 20px;cursor:pointer}</style>
</head><body><div class='container'><div class='top'><div><h1>🤖 선우 AI</h1><p>코딩, 만들기, 궁금한 거 무엇이든!</p></div><button onclick='clearHistory()'>기록 삭제</button></div><div id='chat'></div><div class='input-area'><textarea id='message' placeholder='메시지를 입력해...'></textarea><button onclick='sendMessage()'>보내기</button></div></div><script>
const chat=document.getElementById('chat');
function saveHistory(){localStorage.setItem('chatHistory',chat.innerHTML)}
function loadHistory(){const h=localStorage.getItem('chatHistory');if(h)chat.innerHTML=h;chat.scrollTop=chat.scrollHeight}
function clearHistory(){if(confirm('채팅 기록을 삭제할까?')){localStorage.removeItem('chatHistory');chat.innerHTML='';}}
function addMessage(text,type){const div=document.createElement('div');div.className=`message ${type}`;div.textContent=text;chat.appendChild(div);chat.scrollTop=chat.scrollHeight;saveHistory();return div;}
async function sendMessage(){const input=document.getElementById('message');const msg=input.value.trim();if(!msg)return;addMessage(msg,'user');input.value='';const loading=addMessage('생각하는 중...','ai');try{const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});const d=await r.json();loading.textContent=d.reply;saveHistory();}catch(e){loading.textContent='오류가 발생했어 😢';saveHistory();}}
document.getElementById('message').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});loadHistory();
</script></body></html>
